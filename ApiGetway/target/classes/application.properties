spring.application.name=ApiGateway
server.port=8084

eureka.client.service-url.defaultZone=http://localhost:8010/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Enable discovery locator (optional but recommended)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route 1 - User Microservice
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USERMICROSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/**

# Route 2 - Account Management
spring.cloud.gateway.routes[1].id=account-management
spring.cloud.gateway.routes[1].uri=lb://ACCOUNT-MANAGEMENT
spring.cloud.gateway.routes[1].predicates[0]=Path=/userAcc/**